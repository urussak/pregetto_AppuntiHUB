<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — AppuntiHUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/variabili.css">
  <link rel="stylesheet" href="../css/componenti.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">📚</div>
      <h1 class="auth-titolo">AppuntiHUB</h1>
      <p class="auth-sottotitolo">Scegli una nuova password</p>
      <div id="messaggio" class="messaggio"></div>
      <form id="form-reset" class="auth-form" novalidate>
        <div class="campo">
          <label for="nuova-password">Nuova password</label>
          <input type="password" id="nuova-password" placeholder="Minimo 6 caratteri" required>
        </div>
        <div class="campo">
          <label for="conferma-password">Conferma password</label>
          <input type="password" id="conferma-password" placeholder="Ripeti la password" required>
        </div>
        <button type="submit" id="btn-reset" class="btn btn-primario" style="width:100%">Reimposta password</button>
      </form>
      <div class="auth-link">
        <a href="login.html">← Torna al login</a>
      </div>
    </div>
  </div>
  <script src="../js/config.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      if (!token) {
        Utils.mostraErrore('messaggio', 'Link non valido o scaduto.');
        document.getElementById('form-reset').style.display = 'none';
        return;
      }
      document.getElementById('form-reset').addEventListener('submit', async (e) => {
        e.preventDefault();
        const nuova = document.getElementById('nuova-password').value;
        const conferma = document.getElementById('conferma-password').value;
        if (nuova.length < 6) { Utils.mostraErrore('messaggio', 'La password deve avere almeno 6 caratteri.'); return; }
        if (nuova !== conferma) { Utils.mostraErrore('messaggio', 'Le password non coincidono.'); return; }
        const btn = document.getElementById('btn-reset');
        Utils.bottoneCaricamento(btn, 'Salvataggio...');
        try {
          await Api.resetPassword(token, nuova);
          Utils.mostraSuccesso('messaggio', '✅ Password aggiornata! Reindirizzamento...');
          document.getElementById('form-reset').style.display = 'none';
          setTimeout(() => Utils.vai('login.html'), 2000);
        } catch (err) {
          Utils.mostraErrore('messaggio', err.message);
        } finally {
          Utils.bottoneRipristina(btn);
        }
      });
    });
  </script>
</body>
</html>
